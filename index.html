<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>おんたまカブカブ</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            terracotta: '#E07A5F',
            sage: '#81B29A',
            bluegrey: '#3D405B',
            cream: '#F4F1DE',
            mustard: '#F2CC8F',
          },
          fontFamily: {
            rounded: ['"M PLUS Rounded 1c"', 'sans-serif'],
            kyokasho: ['"UD Digi Kyokasho N-B"', '"UD デジタル 教科書体 N-B"', '"Klee One"', 'serif'],
          }
        }
      }
    }
  </script>

  <!-- React & ReactDOM & Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&family=M+PLUS+Rounded+1c:wght@500;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      touch-action: manipulation;
      user-select: none;
      height: 100dvh; 
      width: 100vw;
      font-family: 'M PLUS Rounded 1c', sans-serif;
    }
    
    #root {
      height: 100%;
      width: 100%;
    }

    /* コルクボード風背景 */
    .bg-cork {
      background-color: #d0a57b;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
    }

    /* 紙の質感背景 */
    .bg-paper {
      background-color: #F4F1DE;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
    }

    /* マスキングテープ装飾 */
    .masking-tape {
      position: absolute;
      top: -12px;
      left: 50%;
      transform: translateX(-50%) rotate(-2deg);
      width: 120px;
      height: 30px;
      background-color: rgba(129, 178, 154, 0.7);
      box-shadow: 0 1px 2px rgba(0,0,0,0.1);
      z-index: 10;
      border-left: 2px dotted rgba(255,255,255,0.6);
      border-right: 2px dotted rgba(255,255,255,0.6);
    }
    
    .masking-tape-terracotta { background-color: rgba(224, 122, 95, 0.7); transform: translateX(-50%) rotate(3deg); }
    .masking-tape-mustard { background-color: rgba(242, 204, 143, 0.7); transform: translateX(-50%) rotate(-1deg); }

    /* アニメーション */
    @keyframes openNote {
      0% { transform: translateY(20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .animate-open-note {
      animation: openNote 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes popIn {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .animate-pop-in { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
    
    /* グラフ用Canvas */
    canvas {
      width: 100%;
      height: 100%;
      background-color: white;
      border-radius: 0.5rem;
    }

    /* スクロールバー非表示設定 */
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 10社のデータ定義と変動アルゴリズムのパラメータ
    const stockInfo = {
      ontama: { id: 1, name: 'おんたま社', desc: 'あまり ねだんが かわらない。あんしん。', color: '#81B29A', icon: '🥚', basePrice: 100, trendCycle: 40, trendAmp: 20, waveCycle: 10, waveAmp: 10, noise: 5 },
      gosho: { id: 2, name: '五小カンパニー', desc: 'ふつうの かいしゃ。すこし ねだんが うごく。', color: '#3D405B', icon: '🎒', basePrice: 200, trendCycle: 30, trendAmp: 40, waveCycle: 14, waveAmp: 20, noise: 10 },
      vegetable: { id: 3, name: 'まほうのやさい', desc: 'ねだんが はげしく うごく！あぶないかも？', color: '#E07A5F', icon: '🥦', basePrice: 80, trendCycle: 20, trendAmp: 40, waveCycle: 6, waveAmp: 30, noise: 20 },
      terracotta: { id: 4, name: 'テラコッタ文具', desc: 'ながい じかんをかけて ゆっくり うごく。', color: '#d97757', icon: '✏️', basePrice: 150, trendCycle: 100, trendAmp: 80, waveCycle: 20, waveAmp: 10, noise: 5 },
      sagefarm: { id: 5, name: 'セージ農園', desc: '上がったり 下がったりが わかりやすい。', color: '#72a88e', icon: '🌿', basePrice: 120, trendCycle: 28, trendAmp: 10, waveCycle: 8, waveAmp: 40, noise: 5 },
      mustard: { id: 6, name: 'マスタード商事', desc: 'あんていしているが、たまに すごく 高くなる！', color: '#eabf7b', icon: '🏢', basePrice: 300, trendCycle: 60, trendAmp: 30, waveCycle: 18, waveAmp: 20, noise: 10 }, 
      blue: { id: 7, name: 'ブルー工業', desc: 'ねだんが 高い。でも あまり うごかない。', color: '#2a2c42', icon: '⚙️', basePrice: 800, trendCycle: 80, trendAmp: 80, waveCycle: 24, waveAmp: 40, noise: 15 },
      cream: { id: 8, name: 'クリーム出版', desc: 'やすい から はじめてでも 買いやすい。', color: '#bfae83', icon: '📚', basePrice: 40, trendCycle: 40, trendAmp: 15, waveCycle: 12, waveAmp: 10, noise: 5 },
      hotspring: { id: 9, name: 'わくわく温泉', desc: 'どう うごくか まったく わからない！', color: '#ff7b7b', icon: '♨️', basePrice: 250, trendCycle: 14, trendAmp: 60, waveCycle: 5, waveAmp: 60, noise: 80 },
      miracle: { id: 10, name: 'ミラクル・トイ', desc: 'すごく 高い！ お金もち むけ の かぶ。', color: '#9b5de5', icon: '🧸', basePrice: 1500, trendCycle: 90, trendAmp: 400, waveCycle: 30, waveAmp: 150, noise: 50 }
    };

    // 基準日からの経過ステップ（半日単位）を計算する関数
    const getStepFromDate = (date) => {
      const baseDate = new Date(2024, 0, 1); 
      const diffTime = date.getTime() - baseDate.getTime();
      const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      const isAfternoon = date.getHours() >= 12;
      return diffDays * 2 + (isAfternoon ? 1 : 0);
    };

    // 特定のステップの価格を計算するアルゴリズム
    const calculatePrice = (stockKey, step) => {
      const info = stockInfo[stockKey];
      
      const noiseFunc = (s) => {
        let x = Math.sin(info.id * 1234.5678 + s * 9876.5432) * 10000;
        return (x - Math.floor(x)) * 2 - 1.0;
      };

      const trend = Math.sin(step * (Math.PI * 2 / info.trendCycle)) * info.trendAmp;
      const wave = Math.sin(step * (Math.PI * 2 / info.waveCycle)) * info.waveAmp;
      const noise = noiseFunc(step) * info.noise;

      let price = Math.floor(info.basePrice + trend + wave + noise);

      if (stockKey === 'mustard' && noiseFunc(step * 1.13) > 0.85) {
        price += 400; 
      }

      if (price < 5) price = 5;
      
      return price;
    };

    const App = () => {
      const [gameState, setGameState] = useState('TITLE'); // TITLE, EXCHANGE, MARKET
      const [isLoading, setIsLoading] = useState(true);
      
      const [score, setScore] = useState(0); 
      const [coin, setCoin] = useState(0);   
      
      const initialPortfolio = Object.keys(stockInfo).reduce((acc, key) => {
        acc[key] = 0;
        return acc;
      }, {});
      const [portfolio, setPortfolio] = useState(initialPortfolio);

      const [selectedStock, setSelectedStock] = useState('ontama');
      const [message, setMessage] = useState('');
      
      const [currentDate, setCurrentDate] = useState(new Date());
      const [currentStep, setCurrentStep] = useState(getStepFromDate(new Date()));
      const [historyData, setHistoryData] = useState([]); 

      const canvasRef = useRef(null);

      useEffect(() => {
        const loadData = () => {
          const savedScore = parseInt(localStorage.getItem('gogo_drill_score') || '0', 10);
          const savedCoin = parseInt(localStorage.getItem('ontama_coin') || '0', 10);
          const savedPortfolioStr = localStorage.getItem('ontama_portfolio');
          
          if (savedPortfolioStr) {
            const parsed = JSON.parse(savedPortfolioStr);
            const mergedPortfolio = { ...initialPortfolio, ...parsed };
            setPortfolio(mergedPortfolio);
          }
          
          setScore(savedScore);
          setCoin(savedCoin);
          
          setTimeout(() => setIsLoading(false), 500);
        };
        
        loadData();

        const timer = setInterval(() => {
          const now = new Date();
          const step = getStepFromDate(now);
          if (step !== currentStep) {
            setCurrentDate(now);
            setCurrentStep(step);
          }
        }, 60000);

        return () => clearInterval(timer);
      }, [currentStep]);

      useEffect(() => {
        const newHistory = [];
        const pastSteps = 14; 
        
        for (let i = currentStep - pastSteps; i <= currentStep; i++) {
          newHistory.push({
            step: i,
            price: calculatePrice(selectedStock, i)
          });
        }
        setHistoryData(newHistory);
      }, [currentStep, selectedStock]);

      const updateAssets = (newScore, newCoin) => {
        setScore(newScore);
        setCoin(newCoin);
        localStorage.setItem('gogo_drill_score', newScore.toString());
        localStorage.setItem('ontama_coin', newCoin.toString());
      };

      const updatePortfolio = (newPortfolio) => {
        setPortfolio(newPortfolio);
        localStorage.setItem('ontama_portfolio', JSON.stringify(newPortfolio));
      };

      const showMessage = (text) => {
        setMessage(text);
        setTimeout(() => setMessage(''), 3000);
      };

      const exchange = (amount, type) => {
        if (type === 'TO_COIN') {
          if (score >= amount) {
            updateAssets(score - amount, coin + amount);
            showMessage(`✨ ${amount}スコア を コインに かえたよ！ ✨`);
          } else {
            showMessage('❌ スコアが たりないよ！');
          }
        } else {
          if (coin >= amount) {
            updateAssets(score + amount, coin - amount);
            showMessage(`✨ ${amount}コイン を スコアに かえたよ！ ✨`);
          } else {
            showMessage('❌ コインが たりないよ！');
          }
        }
      };

      const currentPrice = historyData.length > 0 ? historyData[historyData.length - 1].price : 0;

      const buyStock = () => {
        if (coin >= currentPrice) {
          updateAssets(score, coin - currentPrice);
          const newPort = { ...portfolio, [selectedStock]: portfolio[selectedStock] + 1 };
          updatePortfolio(newPort);
          showMessage(`🛒 ${stockInfo[selectedStock].name} を 1かぶ 買ったよ！`);
        } else {
          showMessage('❌ コインが たりないよ！');
        }
      };

      const sellStock = () => {
        if (portfolio[selectedStock] > 0) {
          updateAssets(score, coin + currentPrice);
          const newPort = { ...portfolio, [selectedStock]: portfolio[selectedStock] - 1 };
          updatePortfolio(newPort);
          showMessage(`💰 ${stockInfo[selectedStock].name} を 1かぶ 売ったよ！`);
        } else {
          showMessage('❌ この かぶ は もっていないよ！');
        }
      };

      const sellAll = () => {
        let totalRevenue = 0;
        const currentPortfolio = { ...portfolio };
        
        Object.keys(currentPortfolio).forEach(key => {
          if (currentPortfolio[key] > 0) {
            const price = calculatePrice(key, currentStep);
            totalRevenue += currentPortfolio[key] * price;
            currentPortfolio[key] = 0;
          }
        });
        
        if (totalRevenue > 0) {
          updateAssets(score, coin + totalRevenue);
          updatePortfolio(currentPortfolio);
          showMessage(`🎉 ぜんぶ売って ${totalRevenue} コイン になったよ！`);
        } else {
          showMessage('❌ うれる かぶを もっていないよ！');
        }
      };

      useEffect(() => {
        if (gameState !== 'MARKET' || !canvasRef.current || historyData.length === 0) return;
        
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        const width = canvas.width = canvas.offsetWidth;
        const height = canvas.height = canvas.offsetHeight;
        
        ctx.clearRect(0, 0, width, height);
        
        ctx.strokeStyle = '#e5e7eb';
        ctx.lineWidth = 1;
        ctx.beginPath();
        for(let i=1; i<5; i++) {
          const y = (height / 5) * i;
          ctx.moveTo(0, y);
          ctx.lineTo(width, y);
        }
        
        for(let i=0; i<historyData.length; i++) {
          if (i % 2 === 0) {
            const x = (width / (historyData.length - 1)) * i;
            ctx.moveTo(x, 0);
            ctx.lineTo(x, height);
          }
        }
        ctx.stroke();

        const prices = historyData.map(d => d.price);
        const maxVal = Math.max(...prices, 10);
        const minVal = Math.min(...prices, 0);
        const range = (maxVal - minVal) * 1.3 || 10; 
        const displayMin = Math.max(0, minVal - range * 0.15);
        
        const stepX = width / (prices.length - 1);
        
        ctx.beginPath();
        ctx.strokeStyle = stockInfo[selectedStock].color;
        ctx.lineWidth = 4;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        
        prices.forEach((val, i) => {
          const x = i * stepX;
          const y = height - ((val - displayMin) / range) * height;
          if (i === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        });
        ctx.stroke();

        const lastVal = prices[prices.length - 1];
        const lastX = (prices.length - 1) * stepX;
        const lastY = height - ((lastVal - displayMin) / range) * height;
        
        ctx.beginPath();
        ctx.fillStyle = stockInfo[selectedStock].color;
        ctx.arc(lastX, lastY, 6, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#9ca3af';
        ctx.font = '10px sans-serif';
        ctx.fillText('1しゅうかん前', 5, height - 5);
        ctx.textAlign = 'right';
        ctx.fillText('いま', width - 5, height - 5);

      }, [gameState, historyData, selectedStock]);

      const backToPortal = () => {
        window.location.href = 'https://hot-spring-egg.github.io/5sho-drill/';
      };

      const dateStr = `${currentDate.getMonth() + 1}月${currentDate.getDate()}日`;
      const timeStr = currentDate.getHours() < 12 ? 'ごぜん' : 'ごご';

      if (isLoading) {
        return (
          <div className="w-full h-full flex flex-col items-center justify-center bg-cork">
            <div className="w-16 h-16 border-4 border-white border-t-terracotta rounded-full animate-spin"></div>
            <p className="mt-4 text-white font-bold animate-pulse text-xl drop-shadow-md">じゅんびちゅう...</p>
          </div>
        );
      }

      // ★よりコンパクトにしたステータスヘッダー
      const StatusHeader = () => (
        <div className="flex justify-around items-center bg-white/95 px-4 py-2 rounded-full shadow-sm w-full max-w-2xl mb-2 border border-gray-200 z-20 shrink-0">
          <div className="flex items-baseline gap-2">
            <span className="text-[10px] font-bold text-gray-500 hidden sm:inline">ドリル スコア</span>
            <span className="text-[10px] font-bold text-gray-500 sm:hidden">スコア</span>
            <span className="text-xl font-bold text-sage">{score.toLocaleString()}</span>
          </div>
          <div className="text-gray-300">|</div>
          <div className="flex items-baseline gap-2">
            <span className="text-[10px] font-bold text-gray-500 hidden sm:inline">おんたま コイン</span>
            <span className="text-[10px] font-bold text-gray-500 sm:hidden">コイン</span>
            <span className="text-xl font-bold text-terracotta">{coin.toLocaleString()}</span>
          </div>
        </div>
      );

      return (
        <div className="w-full h-full flex flex-col items-center p-3 relative bg-cork overflow-hidden">
          
          {message && (
            <div className="absolute top-16 left-1/2 transform -translate-x-1/2 bg-bluegrey text-white px-6 py-3 rounded-full shadow-2xl font-bold z-50 animate-pop-in text-center whitespace-pre-wrap border-2 border-white w-max max-w-[90%]">
              {message}
            </div>
          )}

          {gameState === 'TITLE' && (
            <div className="w-full h-full flex flex-col items-center justify-center relative">
              <button onClick={backToPortal} className="absolute top-0 left-0 bg-white/90 text-bluegrey px-4 py-2 rounded-full font-bold shadow-sm border border-gray-200">
                ← ドリルにもどる
              </button>
              
              <div className="bg-paper px-8 py-8 rounded-sm shadow-xl mb-10 transform -rotate-2 relative border border-white">
                <div className="masking-tape masking-tape-terracotta"></div>
                <div className="text-6xl text-center mb-2">📈</div>
                <h1 className="text-4xl sm:text-5xl font-bold text-bluegrey tracking-widest text-center">おんたまカブカブ</h1>
                <p className="text-center mt-4 text-gray-600 font-bold">かぶを 買って コインを ふやそう！</p>
              </div>

              <div className="flex flex-col gap-4 w-full max-w-sm">
                <button 
                  onClick={() => setGameState('EXCHANGE')}
                  className="bg-sage text-white py-4 rounded-full shadow-lg text-xl font-bold active:translate-y-1 transition-transform border-4 border-white flex justify-center items-center gap-2"
                >
                  🏦 りょうがえじょ へ
                </button>
                <button 
                  onClick={() => setGameState('MARKET')}
                  className="bg-terracotta text-white py-4 rounded-full shadow-lg text-xl font-bold active:translate-y-1 transition-transform border-4 border-white flex justify-center items-center gap-2"
                >
                  🛒 マーケット へ
                </button>
              </div>
            </div>
          )}

          {gameState === 'EXCHANGE' && (
            <div className="w-full h-full flex flex-col items-center">
              <button onClick={() => setGameState('TITLE')} className="self-start bg-white/90 text-bluegrey px-4 py-1.5 rounded-full text-sm font-bold shadow-sm mb-2">
                ← もどる
              </button>

              <StatusHeader />

              <div className="w-full max-w-2xl flex-1 flex flex-col bg-paper rounded-lg shadow-xl p-4 relative animate-open-note border border-white overflow-y-auto">
                <div className="masking-tape masking-tape-mustard"></div>
                <h2 className="text-2xl font-bold text-center text-bluegrey mb-4 mt-2">🏦 りょうがえじょ</h2>
                
                <p className="text-center text-sm text-gray-600 mb-6 font-bold">ドリルでためた「スコア」と、<br/>かぶを買うための「コイン」を こうかんします。</p>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-2 h-full bg-sage"></div>
                  <h3 className="font-bold text-sage mb-3 pl-4">スコア を コイン にする</h3>
                  <div className="flex flex-wrap justify-center gap-3">
                    <button onClick={() => exchange(10, 'TO_COIN')} className="bg-sage text-white px-4 py-2 rounded-lg font-bold active:scale-95 transition-transform flex-1 min-w-[120px]">
                      10 スコア ➡
                    </button>
                    <button onClick={() => exchange(100, 'TO_COIN')} className="bg-sage text-white px-4 py-2 rounded-lg font-bold active:scale-95 transition-transform flex-1 min-w-[120px]">
                      100 スコア ➡
                    </button>
                  </div>
                </div>

                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 mb-4 relative overflow-hidden">
                  <div className="absolute top-0 left-0 w-2 h-full bg-terracotta"></div>
                  <h3 className="font-bold text-terracotta mb-3 pl-4">コイン を スコア にもどす</h3>
                  <div className="flex flex-wrap justify-center gap-3">
                    <button onClick={() => exchange(10, 'TO_SCORE')} className="bg-terracotta text-white px-4 py-2 rounded-lg font-bold active:scale-95 transition-transform flex-1 min-w-[120px]">
                      ⬅ 10 コイン
                    </button>
                    <button onClick={() => exchange(100, 'TO_SCORE')} className="bg-terracotta text-white px-4 py-2 rounded-lg font-bold active:scale-95 transition-transform flex-1 min-w-[120px]">
                      ⬅ 100 コイン
                    </button>
                  </div>
                </div>

                <div className="mt-auto flex justify-center pb-2">
                  <button 
                    onClick={() => setGameState('MARKET')}
                    className="w-full sm:w-auto px-10 py-3 bg-bluegrey text-white rounded-full font-bold shadow-md active:translate-y-1 border-2 border-white"
                  >
                    かぶ を かいにいく ➡
                  </button>
                </div>
              </div>
            </div>
          )}

          {gameState === 'MARKET' && (
            <div className="w-full h-full flex flex-col items-center">
              <button onClick={() => setGameState('TITLE')} className="self-start bg-white/90 text-bluegrey px-4 py-1.5 rounded-full text-sm font-bold shadow-sm mb-2">
                ← もどる
              </button>

              <StatusHeader />

              <div className="w-full max-w-3xl flex-1 flex flex-col bg-paper rounded-lg shadow-xl p-3 relative animate-open-note border border-white overflow-hidden">
                <div className="masking-tape"></div>
                
                <div className="flex justify-between items-end mt-3 mb-2">
                  <h2 className="text-xl font-bold text-bluegrey">🛒 マーケット</h2>
                  <div className="text-right">
                    <p className="text-[10px] text-gray-500 font-bold mb-0.5">いまの じかん</p>
                    <p className="text-sm font-bold text-bluegrey bg-white px-2 py-0.5 rounded-full shadow-sm border border-gray-200">
                      📅 {dateStr} {timeStr}
                    </p>
                  </div>
                </div>

                {/* ★10社の銘柄選択タブ（横スクロール・スナップ対応でわかりやすく） */}
                <div className="flex gap-2 mb-2 overflow-x-auto pb-3 pt-1 scrollbar-hide snap-x snap-mandatory">
                  {Object.entries(stockInfo).map(([key, info]) => (
                    <button
                      key={key}
                      onClick={() => setSelectedStock(key)}
                      className={`snap-center flex flex-col items-center justify-center min-w-[76px] p-2 rounded-xl font-bold whitespace-nowrap transition-all border-2 shrink-0 relative ${
                        selectedStock === key 
                          ? 'bg-white shadow-md border-bluegrey text-bluegrey transform scale-105 z-10' 
                          : 'bg-gray-100 border-transparent text-gray-500 hover:bg-white opacity-80'
                      }`}
                    >
                      <span className="text-2xl mb-1">{info.icon}</span>
                      <span className="text-[10px] leading-tight text-center w-full overflow-hidden text-ellipsis">{info.name}</span>
                      {/* 所有バッジ */}
                      {portfolio[key] > 0 && (
                        <span className="absolute -top-1.5 -right-1.5 bg-terracotta text-white text-[10px] px-1.5 py-0.5 rounded-full shadow-sm border border-white">
                          {portfolio[key]}
                        </span>
                      )}
                    </button>
                  ))}
                  {/* スクロール用の余白 */}
                  <div className="min-w-[10px] shrink-0"></div>
                </div>

                {/* チャートエリア（高さを少し抑える） */}
                <div className="relative w-full aspect-[3/1] min-h-[100px] max-h-[140px] bg-white rounded-xl shadow-inner border border-gray-200 mb-3 p-1.5 shrink-0">
                  <canvas ref={canvasRef} className="w-full h-full"></canvas>
                </div>

                {/* ★株の詳細・操作エリア（大きく見やすく） */}
                <div className="bg-white p-3 rounded-xl shadow-sm border-2 mb-2 flex-1 flex flex-col overflow-y-auto" style={{ borderColor: stockInfo[selectedStock].color }}>
                  <div className="flex items-center justify-between mb-2">
                    <div className="flex items-center gap-2">
                      <span className="text-2xl">{stockInfo[selectedStock].icon}</span>
                      <h3 className="font-bold text-base sm:text-lg" style={{ color: stockInfo[selectedStock].color }}>{stockInfo[selectedStock].name}</h3>
                    </div>
                  </div>
                  <p className="text-xs text-gray-600 font-bold mb-3 bg-gray-50 p-2 rounded">{stockInfo[selectedStock].desc}</p>
                  
                  <div className="flex justify-around items-stretch mb-3 gap-2">
                    <div className="text-center bg-gray-50 rounded-lg p-2 sm:p-3 flex-1 border border-gray-200 shadow-inner">
                      <p className="text-xs sm:text-sm text-gray-500 font-bold mb-1">いまの ねだん (1かぶ)</p>
                      <p className="text-3xl sm:text-4xl font-bold text-bluegrey leading-none">
                        {currentPrice} <span className="text-sm">コイン</span>
                      </p>
                    </div>
                    <div className="text-center bg-gray-50 rounded-lg p-2 sm:p-3 flex-1 border border-gray-200 shadow-inner">
                      <p className="text-xs sm:text-sm text-gray-500 font-bold mb-1">もっている かず</p>
                      <p className="text-3xl sm:text-4xl font-bold text-bluegrey leading-none">
                        {portfolio[selectedStock]} <span className="text-sm">かぶ</span>
                      </p>
                    </div>
                  </div>

                  <div className="flex gap-3 mt-auto shrink-0">
                    <button 
                      onClick={buyStock}
                      className="flex-1 bg-terracotta text-white py-3 sm:py-4 rounded-xl font-bold shadow-md active:translate-y-1 flex justify-center items-center gap-1 text-lg sm:text-xl"
                    >
                      👇 かう
                    </button>
                    <button 
                      onClick={sellStock}
                      className="flex-1 bg-sage text-white py-3 sm:py-4 rounded-xl font-bold shadow-md active:translate-y-1 flex justify-center items-center gap-1 text-lg sm:text-xl"
                    >
                      👆 うる
                    </button>
                  </div>
                </div>

                {/* 一括売却ボタン */}
                <div className="shrink-0">
                  <button 
                    onClick={sellAll}
                    className="w-full bg-mustard text-bluegrey py-2.5 rounded-xl font-bold shadow-sm active:translate-y-1 text-sm border-2 border-white"
                  >
                    もっている かぶ を ぜんぶ 売る！
                  </button>
                </div>

              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
